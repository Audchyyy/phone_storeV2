{% extends 'layout.html' %}
{% block title %}เพิ่มสินค้า{% endblock %}

{% block styles %}
<style>
    :root {
        --bg: #f5f5f7;
        --white: #fff;
        --ink: #1d1d1f;
        --muted: #6e6e73;
        --border: #d2d2d7;
        --blue: #0071e3;
    }

    .form-page {
        background: var(--bg);
        min-height: calc(100vh - 44px);
        padding: 2.5rem 1.5rem;
    }

    .form-wrap {
        max-width: 600px;
        margin: 0 auto;
    }

    .form-title {
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--ink);
        margin-bottom: 1.5rem;
        letter-spacing: -.02em;
    }

    .form-card {
        background: var(--white);
        border-radius: 16px;
        padding: 2rem;
        box-shadow: 0 2px 12px rgba(0, 0, 0, .06);
    }

    .form-group {
        margin-bottom: 1.2rem;
    }

    .form-group label {
        display: block;
        font-size: .72rem;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: .03em;
        margin-bottom: .4rem;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: .75rem 1rem;
        font-size: .88rem;
        color: var(--ink);
        outline: none;
        transition: border-color .2s, box-shadow .2s;
        background: #fff;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(0, 113, 227, .15);
    }

    .form-group textarea {
        resize: vertical;
        min-height: 100px;
    }

    .btn-submit {
        width: 100%;
        background: var(--blue);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: .9rem;
        font-size: .95rem;
        font-weight: 500;
        cursor: pointer;
        transition: background .2s;
    }

    .btn-submit:hover {
        background: #0077ed;
    }

    .btn-back {
        display: block;
        text-align: center;
        color: var(--muted);
        font-size: .85rem;
        margin-top: .8rem;
        text-decoration: none;
    }

    .btn-back:hover {
        color: var(--blue);
    }
</style>
{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-wrap">
        <h1 class="form-title">เพิ่มสินค้า</h1>
        <div class="form-card">
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label>ชื่อสินค้า *</label>
                    <input type="text" name="name" required placeholder="เช่น MacBook Air 13">
                </div>
                <div class="form-group">
                    <label>คำอธิบายสั้น</label>
                    <input type="text" name="subtitle" placeholder="เช่น Apple M3 Chip, 8GB RAM">
                </div>
                <div class="form-group">
                    <label>รายละเอียด</label>
                    <textarea name="description" placeholder="รายละเอียดสินค้า..."></textarea>
                </div>
                <div class="form-group">
                    <label>ราคา (บาท) *</label>
                    <input type="number" name="price" required placeholder="0.00" step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label>หมวดหมู่</label>
                    <select name="category">
                        <option value="mac">Mac</option>
                        <option value="iphone">iPhone</option>
                        <option value="ipad">iPad</option>
                        <option value="watch">Watch</option>
                        <option value="airpods">AirPods</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>รูปภาพสินค้า</label>
                    <input type="file" name="image" accept="image/*">
                </div>
                <div class="form-group">
                <label>3D Model (.glb)</label>
                <input type="file" name="model" accept=".glb,.gltf">
                </div>
                <div class="form-group">
                    <label>Badge</label>
                    <select name="badge">
                        <option value="">ไม่มี</option>
                        <option value="ใหม่">ใหม่</option>
                        <option value="ลดราคา">ลดราคา</option>
                        <option value="ขายดี">ขายดี</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">+ เพิ่มสินค้า</button>
            </form>
        </div>
        <a class="btn-back" href="{{ url_for('product.mac') }}">← กลับ</a>
    </div>
</div>
{% endblock %}
